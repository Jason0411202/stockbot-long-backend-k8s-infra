apiVersion: cert-manager.io/v1
kind: ClusterIssuer            # 整個 cluster 共用的憑證申請設定
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Let's Encrypt 正式環境 API
    # 測試用 staging：https://acme-staging-v02.api.letsencrypt.org/directory

    email: your-email@example.com   # ⚠️ 改成你的 email

    privateKeySecretRef:
      name: letsencrypt-prod-key

    solvers:
      - http01:
          ingress:
            class: nginx
        # HTTP-01 challenge：
        # Let's Encrypt 會打你的 http://域名/.well-known/acme-challenge/xxx
        # cert-manager 自動建暫時 endpoint 回應
        # 驗證通過 → 發給你憑證
